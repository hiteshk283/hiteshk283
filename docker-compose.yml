version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: control-center-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/control_center
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend/flutter_app
    container_name: control-center-frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend

  db:
    image: postgres:15
    container_name: control-center-db
    environment:
      POSTGRES_DB: control_center
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
